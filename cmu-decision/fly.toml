# Fly.io — CMU Plataforma (Conductores del Mundo, S.A.P.I. de C.V.)
# Deploy: fly deploy
# Secrets: fly secrets set DATABASE_URL="..." TWILIO_ACCOUNT_SID="..." etc.

app = "cmu-originacion"
primary_region = "gdl"  # Guadalajara — México (needed for MercadoLibre API access)

[build]

[env]
  PORT = "5000"
  NODE_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[checks]
  [checks.health]
    type = "http"
    port = 5000
    path = "/api/health"
    interval = "30s"
    timeout = "3s"
    grace_period = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
