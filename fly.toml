# Fly.io configuration — CONDUCTORES DEL MUNDO, S.A.P.I. DE C.V.
# Deploy: fly launch / fly deploy

app = "cmu-originacion"
primary_region = "dfw"  # Dallas — closest to Aguascalientes

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[checks]
  [checks.health]
    type = "http"
    port = 3000
    path = "/api/health"
    interval = "30s"
    timeout = "3s"
    grace_period = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
