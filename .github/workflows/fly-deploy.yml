name: Deploy to Fly.io

on:
  push:
    branches:
      - main
    paths:
      - 'cmu-decision/**'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-group  # prevent parallel deploys

    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --no-cache --wait-timeout 300
        working-directory: cmu-decision
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
